<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluxiAds — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-main:        #0a0a0f;
      --bg-card:        #12111a;
      --bg-surface:     #1c1a2e;
      --bg-sidebar:     #0d0c16;
      --accent:         #7c3aed;
      --accent-mid:     #8b5cf6;
      --accent-light:   #a78bfa;
      --teal:           #06b6d4;
      --green:          #10b981;
      --red:            #ef4444;
      --text-primary:   #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted:     #475569;
      --border:         rgba(124, 58, 237, 0.15);
      --border-hover:   rgba(124, 58, 237, 0.35);
    }

    html, body {
      min-height: 100dvh;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

    /* ─── Layout ─────────────────────────────────── */
    .login-root {
      display: flex;
      min-height: 100dvh;
      animation: fadeSlideUp 0.45s ease both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Left Branding Panel ─────────────────────── */
    .brand-panel {
      width: 45%;
      min-height: 100dvh;
      background: var(--bg-sidebar);
      border-right: 1px solid rgba(124, 58, 237, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 56px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow blobs */
    .brand-panel::before {
      content: '';
      position: absolute;
      top: -120px;
      left: -80px;
      width: 440px;
      height: 440px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand-panel::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -60px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(6,182,212,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Dot grid texture */
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(124,58,237,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
      opacity: 0.45;
    }

    .brand-content {
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .brand-logo {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 18px;
      user-select: none;
      text-wrap: balance;
    }

    .brand-logo .fluxi { color: var(--text-primary); }

    .brand-logo .ads {
      background: linear-gradient(135deg, var(--accent-mid), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-tagline {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 48px;
      letter-spacing: -0.01em;
    }

    /* Feature list */
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .feature-dot {
      width: 8px;
      height: 8px;
      min-width: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 7px;
      box-shadow: 0 0 8px rgba(124,58,237,0.6);
    }

    .feature-text {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    /* Brand footer */
    .brand-footer {
      position: relative;
      z-index: 1;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.25);
      color: var(--accent-light);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 20px;
      padding: 5px 12px;
    }

    .version-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-mid);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* ─── Right Form Panel ─────────────────────────── */
    .form-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 48px;
      position: relative;
    }

    /* Subtle radial glow behind form */
    .form-panel::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .form-wrap {
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    /* Compact logo */
    .form-logo {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 36px;
      color: var(--text-primary);
    }

    .form-logo .ads {
      background: linear-gradient(135deg, var(--accent-mid), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .form-heading {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 6px;
      text-wrap: balance;
    }

    .form-subheading {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 36px;
    }

    /* Form fields */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid rgba(124,58,237,0.2);
      color: var(--text-primary);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 400;
      border-radius: 10px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder {
      color: var(--text-muted);
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
    }

    .field input[type="password"] {
      padding-right: 44px;
    }

    /* Show/hide password toggle */
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .toggle-pw:hover { color: var(--accent-light); }

    /* Login button */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Shimmer on button */
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn-primary:hover::after {
      transform: translateX(100%);
    }

    /* Loading spinner inside button */
    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
    }

    .error-msg.visible { display: block; }

    /* ─── Reduced motion ─────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─── Responsive ─────────────────────────────── */
    @media (max-width: 768px) {
      .login-root { flex-direction: column; }

      .brand-panel {
        width: 100%;
        min-height: auto;
        padding: 36px 28px 32px;
        border-right: none;
        border-bottom: 1px solid rgba(124,58,237,0.12);
      }

      .brand-logo { font-size: 32px; }
      .brand-tagline { font-size: 15px; margin-bottom: 28px; }
      .feature-list { gap: 14px; }

      .form-panel { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<main class="login-root">

  <!-- ── Left: Branding ─────────────────────────── -->
  <section class="brand-panel" aria-label="FluxiAds branding">
    <div class="dot-grid" aria-hidden="true"></div>

    <div class="brand-content">
      <div class="brand-logo" aria-label="FluxiAds">
        <span class="fluxi">Fluxi</span><span class="ads">Ads</span>
      </div>

      <p class="brand-tagline">Your games.&nbsp; Your ads.&nbsp; Your rules.</p>

      <ul class="feature-list" role="list">
        <li class="feature-item">
          <div class="feature-dot" aria-hidden="true"></div>
          <span class="feature-text">Upload video &amp; image creatives</span>
        </li>
        <li class="feature-item">
          <div class="feature-dot" aria-hidden="true"></div>
          <span class="feature-text">Serve ads to any Unity game via JSON</span>
        </li>
        <li class="feature-item">
          <div class="feature-dot" aria-hidden="true"></div>
          <span class="feature-text">Track impressions &amp; clicks in real time</span>
        </li>
      </ul>
    </div>

    <div class="brand-footer">
      <span class="version-badge">
        <span class="version-dot" aria-hidden="true"></span>
        v1.0 Beta
      </span>
    </div>
  </section>

  <!-- ── Right: Login Form ──────────────────────── -->
  <section class="form-panel" aria-label="Sign in">
    <div class="form-wrap">

      <div class="form-logo" aria-label="FluxiAds">
        Fluxi<span class="ads">Ads</span>
      </div>

      <h1 class="form-heading">Welcome back</h1>
      <p class="form-subheading">Sign in to your dashboard</p>

      <form id="loginForm" novalidate>

        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••••"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              class="toggle-pw"
              id="togglePw"
              aria-label="Show password"
              tabindex="0"
            >
              <!-- Eye icon (hidden = show) -->
              <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (visible = hide) -->
              <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          Sign in
        </button>

        <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>

      </form>
    </div>
  </section>

</main>

<script>
  // ── Supabase init (keys from localStorage or CLAUDE.md defaults) ──
  const SUPABASE_URL = localStorage.getItem('supabase_url')
    || 'https://fteopoguabbydprwoyxv.supabase.co';
  const SUPABASE_ANON_KEY = localStorage.getItem('supabase_anon_key')
    || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0ZW9wb2d1YWJieWRwcndveXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODczODUsImV4cCI6MjA5MTg2MzM4NX0.19hzkmEcLBXqBYB43hse9ZzaaAHvoYXzz-JyHpAys2o';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── Auto-redirect if already logged in ───────────
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  })();

  // ── Password show/hide toggle ─────────────────────
  const pwInput   = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePw');
  const iconShow  = document.getElementById('iconShow');
  const iconHide  = document.getElementById('iconHide');

  toggleBtn.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    iconShow.style.display = isHidden ? 'none' : '';
    iconHide.style.display = isHidden ? ''     : 'none';
    toggleBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  });

  // ── Login form submit ─────────────────────────────
  const form     = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  function clearError() {
    errorMsg.classList.remove('visible');
    errorMsg.textContent = '';
  }

  function setLoading(loading) {
    loginBtn.disabled = loading;
    loginBtn.innerHTML = loading
      ? '<span class="btn-spinner" aria-hidden="true"></span>Signing in…'
      : 'Sign in';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    setLoading(true);

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    setLoading(false);

    if (error) {
      showError(error.message || 'Sign in failed. Please try again.');
      return;
    }

    if (data?.session) {
      window.location.href = 'dashboard.html';
    }
  });
</script>

</body>
</html>
